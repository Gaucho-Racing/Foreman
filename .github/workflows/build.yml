name: build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        # ubuntu-latest ships Docker, which is all testcontainers-go
        # needs. -race + -count=1 surfaces concurrency bugs and skips
        # the test cache so we always actually run.
        env:
          # On GH Actions the Docker socket lives at the standard
          # path; no override needed. We rely on the default.
          TESTCONTAINERS_RYUK_DISABLED: "false"
        run: go test -race -count=1 -timeout=300s ./...

  image:
    name: Build + push image
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/gaucho-racing/foreman
          tags: |
            # main → :latest + :sha-...
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha
            # Release tags strip the v prefix and emit :MAJOR.MINOR.PATCH,
            # :MAJOR.MINOR, and :MAJOR so consumers can pin at whichever
            # specificity they want. The `enable=…` predicate restricts
            # these to actual `v…` git tags so the same workflow on main
            # doesn't accidentally race them.
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
